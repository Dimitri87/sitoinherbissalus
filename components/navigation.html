            <script defer="" data-name="navigation-logic">
              document.addEventListener('DOMContentLoaded', function() {
                (function(){
                  const navToggle = document.getElementById("navToggle")
                  const navClose = document.getElementById("navClose")
                  const mobileOverlay = document.getElementById("mobileOverlay")
                  const mobileLinks = document.querySelectorAll(".navigation-mobile-link")

                  const openMenu = () => {
                    mobileOverlay.classList.add("is-open")
                    document.body.style.overflow = "hidden"
                    navToggle.setAttribute("aria-expanded", "true")
                  }

                  const closeMenu = () => {
                    mobileOverlay.classList.remove("is-open")
                    document.body.style.overflow = ""
                    navToggle.setAttribute("aria-expanded", "false")
                  }

                  navToggle.addEventListener("click", openMenu)
                  navClose.addEventListener("click", closeMenu)

                  mobileLinks.forEach((link) => {
                    link.addEventListener("click", closeMenu)
                  })

                  document.addEventListener("keydown", (e) => {
                    if (e.key === "Escape" && mobileOverlay.classList.contains("is-open")) {
                      closeMenu()
                    }
                  })

                  window.addEventListener("scroll", () => {
                    const nav = document.querySelector(".navigation-wrapper")
                    if (window.scrollY > 20) {
                      nav.style.boxShadow = "0 4px 20px rgba(0, 0, 0, 0.05)"
                    } else {
                      nav.style.boxShadow = "none"
                    }
                  })
                })()
              });
            </script>
